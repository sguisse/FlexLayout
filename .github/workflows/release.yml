name: Release

on:
  workflow_dispatch:
    inputs:
      semver:
        description: "Version bump strategy for the sguisse prerelease line"
        required: true
        default: "prerelease"
        type: choice
        options:
          - prerelease # 0.8.19-sguisse.0 -> 0.8.19-sguisse.1
          - patch # 0.8.19-sguisse.x -> 0.8.20-sguisse.0
          - minor
          - major
      tag:
        description: "The npm dist-tag"
        required: false
        default: "latest"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write # Required for NPM provenance (security)
    steps:
      - name: Validate branch
        run: |
          if [[ "${GITHUB_REF_NAME}" != "release-sguisse" ]]; then
            echo "This workflow must be run from the release-sguisse branch. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important so that the tool can calculate the changelog
          ref: ${{ github.ref_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Bump package version
        id: version
        run: |
          case "${{ inputs.semver }}" in
            prerelease)
              npm version prerelease --preid=sguisse --no-git-tag-version
              ;;
            patch)
              npm version prepatch --preid=sguisse --no-git-tag-version
              ;;
            minor)
              npm version preminor --preid=sguisse --no-git-tag-version
              ;;
            major)
              npm version premajor --preid=sguisse --no-git-tag-version
              ;;
            *)
              echo "Unsupported semver value: ${{ inputs.semver }}" >&2
              exit 1
              ;;
          esac

          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: pnpm build

      # Not woprks in CI due to 2FA and 1Password limitations, and npm provenance provides security so we can skip this step
      # and publish directly from the CLI with the GitHub token for authentication and provenance
      #- name: Publish package to npm
      #  env:
      #    NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      #  run: npm publish --access public --provenance --tag "${{ inputs.tag }}"

      - name: Commit version bump and push
        run: |
          git add package.json
          git commit -m "release: ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:release-sguisse
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          args=(
            "${{ steps.version.outputs.tag }}"
            --title "${{ steps.version.outputs.tag }}"
            --target release-sguisse
            --generate-notes
          )

          if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
